name: 'feedback_revenue'
version: '1.0.0'
config-version: 2

profile: 'feedback_revenue'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  feedback_revenue:
    # Case 1 — SaaS feedback × revenue (Prevision-style challenge)
    staging:
      # Materialized as table (not view) so the warehouse is self-contained
      # — the resulting .duckdb file works without the source CSVs being
      # present at the path the source meta references.
      +materialized: table
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      core:
        +materialized: table
        +schema: marts_core
      analytics:
        +materialized: table
        +schema: marts_analytics

    # Case 2 — Generic marketplace (returns, fraud, GMV)
    marketplace:
      staging:
        +materialized: table
        +schema: marketplace_staging
      intermediate:
        +materialized: ephemeral
      marts:
        core:
          +materialized: table
          +schema: marketplace_core
        analytics:
          +materialized: table
          +schema: marketplace_analytics

vars:
  feedback_pre_churn_window_days: 90
  marketplace_return_window_days: 30

# Audit hooks — make the audit table before any model reads from it,
# then capture the run results once the build finishes.
on-run-start:
  - "{{ ensure_audit_table() }}"
on-run-end:
  - "{{ persist_run_results() }}"
