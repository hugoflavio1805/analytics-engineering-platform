version: 2

models:
  - name: dim_customer
    description: "Conformed customer dimension. Joins customer master with subscription rollup. All derived columns (tenure_days, mrr_band, is_churned) come from intermediate models."
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: segment
        tests:
          - accepted_values:
              values: ['SMB', 'Mid-Market', 'Enterprise']
      - name: current_mrr
        description: "Sum of MRR across active subscriptions. 0 if no active subscription."
        tests: [not_null]
      - name: mrr_band
        description: "Bucket: high (≥500), medium (≥200), low (>0), none."
        tests:
          - accepted_values:
              values: ['high', 'medium', 'low', 'none']
      - name: is_churned
        description: "True if customer status is churned OR no active subscription exists."
        tests: [not_null]

  - name: fct_feedbacks
    description: "One row per feedback event with plan/segment + all derivations from int_feedback_enriched."
    columns:
      - name: feedback_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null:
              config:
                severity: warn
          - relationships:
              to: ref('dim_customer')
              field: customer_id
              config:
                severity: warn
      - name: is_pre_churn_90d
        description: "True if the feedback was emitted within 90 days before the customer's latest_churn_date."

  - name: fct_subscriptions
    description: "One row per subscription with derived lifecycle metrics."
    columns:
      - name: subscription_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id

  - name: customer_feedback_churn
    description: "Analytical mart that answers the obligatory question. One row per customer. Consumed directly by Tableau / Metabase — dashboards must not compute on top."
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: negative_feedback_ratio
        description: "(bugs + complaints) / total_feedbacks. Returns 0 (not NULL) when the customer has no feedback."
      - name: churn_risk_score
        description: "Same value as negative_feedback_ratio; surfaced under a different label for BI semantics."
      - name: is_churned
        tests: [not_null]
