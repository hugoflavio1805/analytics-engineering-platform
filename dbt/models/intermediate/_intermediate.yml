version: 2

models:
  - name: int_customer_subscription_rollup
    description: "Per-customer aggregation of subscription history. Source of truth for current_mrr, has_active_subscription, mrr_band and latest_churn_date — used by dim_customer and int_feedback_enriched."
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: mrr_band
        tests:
          - accepted_values:
              values: ['high', 'medium', 'low', 'none']
      - name: current_mrr
        tests: [not_null]

  - name: int_feedback_enriched
    description: "stg_feedbacks + sentiment_score, type flags, nps_band, days_before_churn and is_pre_churn_90d (window driven by var feedback_pre_churn_window_days, default 90)."
    columns:
      - name: feedback_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: is_pre_churn_90d
        description: "Computed against int_customer_subscription_rollup.latest_churn_date."
