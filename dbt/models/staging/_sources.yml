version: 2

sources:
  - name: raw
    description: "Raw CSVs landed by Airflow daily (or COPY INTO from Snowpipe in prod)."
    loaded_at_field: _loaded_at
    freshness:
      warn_after: { count: 26, period: hour }
      error_after: { count: 48, period: hour }
    tables:
      - name: customers
        description: "One row per customer. Source of truth for plan/segment/status."
        columns:
          - name: customer_id
            tests: [not_null, unique]
          - name: plan
            tests:
              - accepted_values:
                  values: ['starter', 'growth', 'enterprise']
          - name: segment
            tests:
              - accepted_values:
                  values: ['SMB', 'Mid-Market', 'Enterprise']
          - name: status
            tests:
              - accepted_values:
                  values: ['active', 'churned']

      - name: subscriptions
        description: "Subscription history with MRR and lifecycle dates."
        columns:
          - name: subscription_id
            description: "Source has mixed casing/separators; staging normalizes."
          - name: customer_id
            tests:
              - not_null

      - name: feedbacks
        description: "Customer feedback events from form, support, platform, email and NPS channels."
        columns:
          - name: feedback_id
            tests: [not_null, unique]
          - name: type
            tests:
              - accepted_values:
                  values: ['praise', 'complaint', 'bug', 'feature_request', 'support']
          - name: channel
            tests:
              - accepted_values:
                  values: ['nps', 'suporte', 'formulario', 'email', 'plataforma']
          - name: sentiment
            tests:
              - accepted_values:
                  values: ['positive', 'negative', 'neutral']
