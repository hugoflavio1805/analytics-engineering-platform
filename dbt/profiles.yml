# Local profile (committed to repo for reproducibility).
# In production, this lives in ~/.dbt/profiles.yml and points at Snowflake.
feedback_revenue:
  target: duckdb
  outputs:
    duckdb:
      type: duckdb
      path: ../warehouse.duckdb
      threads: 4

    snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'TRANSFORMER') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'ANALYTICS') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'COMPUTE_XS') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA', 'DBT_DEV') }}"
      threads: 8

    ci:
      type: duckdb
      path: ./ci.duckdb
      threads: 2
